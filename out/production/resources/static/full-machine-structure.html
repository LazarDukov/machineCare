<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Структура на машина</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="main-layout">
    <div class="auth-container" style="width: 90%;">

        <h1>Структура на машина</h1>

        <div id="structure-container">

            <p>Зареждане...</p>
        </div>

    </div>
</div>
<div id="device-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('device-modal')">&times;</span>
        <h3>Добави устройство</h3>
        <input id="device-name-input" placeholder="Име">
        <button id="save-device-btn">Запази</button>
    </div>
</div>

<!-- SUBDEVICE -->

<!-- COMPONENT -->

<div id="sub-device-modal-change" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('sub-device-modal-change')">&times;</span>
        <h3>Промени подустройство</h3>
        <input id="sub-device-name-input-change" placeholder="Име">
        <button id="save-sub-device-change-btn">Запази</button>
    </div>
</div>
<script type="module" src="/js/pages/fullStructure.js"></script>
<script type="module" src="/js/ui/fullStructureUI.js"></script>
<script type="module" src="/js/ui/modals.js"></script>

</body>
</html>
