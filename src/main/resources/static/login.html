<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<img src="/images/logo.png" class="logo">

<div class="auth-container">
    <h1>Вход</h1>

        <button type="submit" class="login">Login</button>
    </form>
</div>
<script src="/js/login.js"></script>
</body>
</html>
