<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Всички задачи</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="main-layout">
  <div class="auth-container" style="width: 90%;">

    <h1>Всички задачи</h1>

    <div id="tasks-container">
      <p>Зареждане...</p>
    </div>
    <div id="relation-select-container" style="display:none;">
      <select id="user-select"></select>

    </div>
  </div>
</div>
<div id="employeeModal" class="modal-end-task hidden">

  <div class="modal-content">

    <h3>Избор на служители</h3>

    <div class="transfer-container">

      <select id="allEmployees" size="10"></select>

      <div class="buttons">
        <button id="moveRight">➜</button>
        <button id="moveLeft">⬅</button>
      </div>

      <select id="selectedEmployees" size="10"></select>

    </div>
<div>
  <input id="taskNote" placeholder="Бележка">
</div>

    <div class="footer">
      <button id="confirmEmployees">Избери</button>
      <button id="cancelEmployees">Отказ</button>
    </div>

  </div>

</div>
<script type="module" src="/js/pages/tasks.js"></script>


</body>
</html>
