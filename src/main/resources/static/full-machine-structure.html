<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Структура на машина</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="main-layout">
    <div class="auth-container" style="width: 90%;">

        <h1>Структура на машина</h1>

        <div id="structure-container">

            <p>Зареждане...</p>
        </div>

    </div>
</div>
<div id="device-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('device-modal')">&times;</span>
        <h3>Добави устройство</h3>
        <input id="device-name-input" placeholder="Име">
        <button id="save-device-btn">Запази</button>
    </div>
</div>

<!-- SUBDEVICE -->
<div id="subDevice-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('subDevice-modal')">&times;</span>
        <h3>Добави подустройство</h3>
        <input id="subDevice-name-input" placeholder="Име">
        <button id="save-subDevice-btn">Запази</button>
    </div>
</div>

<!-- COMPONENT -->
<div id="component-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('component-modal')">&times;</span>
        <h3>Добави компонент</h3>
        <input id="component-name-input" placeholder="Име">
        <input id="component-additional-info-input" placeholder="Допълнителна информация">
        <button id="save-component-btn">Запази</button>
    </div>
</div>

<!-- PART -->
<div id="part-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('part-modal')">&times;</span>
        <h3>Добави част</h3>
        <input id="part-name-input" placeholder="Име">
        <input id="part-description-input" placeholder="Описание">
        <input id="part-sap-number-input" placeholder="SAP">
        <input id="part-quantity-input" type="number" placeholder="Брой">
        <button id="save-part-btn">Запази</button>
    </div>
</div>
<div id="change-part-modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal('change-part-modal')">&times;</span>
        <h3>Добави част</h3>
        <input id="part-name-input-change" placeholder="Име">
        <input id="part-description-input-change" placeholder="Описание">
        <input id="part-sap-number-input-change" placeholder="SAP">
        <input id="part-quantity-input-change" type="number" placeholder="Брой">
        <button id="save-changed-part-btn">Запази</button>
    </div>
</div>
<script type="module" src="/js/pages/fullStructure.js"></script>
<script type="module" src="/js/ui/fullStructureUI.js"></script>
<script type="module" src="/js/ui/modals.js"></script>

</body>
</html>
