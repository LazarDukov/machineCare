<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<div>
    <form>

        <label>Username:</label>
        <input type="text"name="username" required>


        <label>First name:</label>
        <input type="text" name="firstName" required>

        <label>Last name:</label>
        <input type="text" name="lastName" required>


        <label>Email:</label>
        <input type="text" name="email" required>

        <label>Department:</label>
        <select id="department" required>
            <option value="" hidden>Not selected</option>
            <option value="HR_DEPARTMENT">Human resources department</option>
            <option value="FINANCE_DEPARTMENT">Finance department</option>
            <option value="SALES_DEPARTMENT">Sales department</option>
            <option value="TECHNICAL_DEPARTMENT">Technical department</option>
            <option value="LOGISTIC_DEPARTMENT">Logistic department</option>
            <option value="QUALITY_DEPARTMENT">Quality department</option>
        </select>


        <label>Password:</label>
        <input type="password" name="password" required>

        <label>Confirm password:</label>
        <input type="password" name="confirmPassword" required>

        <button type="submit">Register</button>

    </form>
</div>
</body>
</html>
